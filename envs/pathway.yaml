name: sc-pathway
channels: [conda-forge, bioconda, nodefaults]
dependencies:
  - python=3.11
  - scanpy=1.10.*
  - anndata>=0.10
  - zarr
  - pandas=2.2.*
  - numpy=1.26.*
  - matplotlib-base=3.8.*
  - seaborn=0.13.*
  - pip
  - pip:
      - decoupler==1.8.0       # PROGENy pathway activity + CollecTRI TF activity
      - omnipath==1.0.8
      - gseapy==1.1.3          # GSEA / over-representation

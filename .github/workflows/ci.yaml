name: ci
on:
  push: {branches: [main]}
  pull_request: {branches: [main]}

jobs:
  lint:
    name: Lint (snakefmt / black / ruff / yaml / schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install snakefmt==0.10.2 black==24.4.2 ruff==0.4.8 yamllint==1.35.1 snakemake-minimal==7.28.3 jsonschema pyyaml
      - run: snakefmt --check workflow/
      - run: black --check workflow/scripts/py
      - run: ruff check workflow/scripts/py
      - run: yamllint -d relaxed config envs profiles .github
      - name: Validate config against schema
        run: python .github/scripts/validate_config.py config/config.yaml config/schemas/config.schema.yaml

  dryrun:
    name: DAG dry-run + snakemake lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install snakemake-minimal==7.28.3 pandas pyyaml jsonschema pulp==2.7.0
      - run: snakemake -n -p --configfile config/config.test.yaml
      - run: snakemake --lint --configfile config/config.test.yaml || true

  e2e:
    name: Tiny end-to-end on the bundled fixture
    runs-on: ubuntu-latest
    needs: dryrun
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with: {miniforge-version: latest, activate-environment: sc-liver, environment-file: environment.yml}
      - name: Run pipeline on fixture
        shell: bash -el {0}
        run: |
          snakemake --configfile config/config.test.yaml --profile profiles/local \
                    --use-conda --conda-frontend conda --cores 2
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: fixture-report, path: results/10_report/}

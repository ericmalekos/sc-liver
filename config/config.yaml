# =============================================================================
# Liver-fibrosis biomarker pipeline — MAIN config (full real run).
# Every threshold / method choice lives here so runs are deterministic and the
# rule files stay logic-only. Validated against config/schemas/config.schema.yaml.
# For the tiny fixture run, see config/config.test.yaml (overrides a subset).
# =============================================================================

project:
  name: sc-liver-fibrosis
  seed: 0

# Central seeds -> set_all_seeds() in every script (Python + R) for determinism.
seeds:
  global: 0
  numpy: 0
  torch: 0
  leiden: 0
  ml: 0

# GPU-optional master switch. false => CPU-only methods everywhere (complete result).
gpu:
  enabled: false
  partition: gpu
  gres: "gpu:1"

# Where the per-sample samplesheet lives. Generated by
# workflow/scripts/py/make_samplesheet.py (queries GEO) for the real run.
samples_tsv: config/samples.tsv

datasets:
  gse136103:
    role: primary
    geo_accession: GSE136103
    supp_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE136nnn/GSE136103/suppl/GSE136103_RAW.tar"
    md5: null                       # filled by make_samplesheet.py / verified on download
    modality: scRNA
    chemistry: 10x_3p_v2
    organism: human
    datashare_rds: "https://datashare.ed.ac.uk/handle/10283/3433"   # optional annotation cross-check
  gse244832:
    role: validation
    geo_accession: GSE244832
    supp_url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE244nnn/GSE244832/suppl/"
    md5: null
    modality: snRNA
    organism: human
    etiology: MASLD_MASH

# Q1 — harmonize heterogeneous fibrosis labels onto a common ordinal axis (0-4).
metadata:
  schema: cellxgene
  nomenclature: rinella2023
  fibrosis_mapping:
    healthy: 0
    normal: 0
    non_cirrhotic: 1
    F0: 0
    F1: 1
    F2: 2
    F3: 3
    F4: 4
    cirrhotic: 4
    MASL: 1
    MASH_F2: 2
    MASH_F3: 3
    MASH_F4: 4
  # axis>=2 is "F2+/significant"; used to build the binary contrast in the validation arm
  f2plus_threshold: 2

# Q2 — QC. Liver-aware, snRNA-aware; preserve stressed/diseased cells.
qc:
  ambient:
    # `decontx` is the principled default for filtered matrices and now runs via a light
    # Python<->R MatrixMarket hand-off (~50s/sample; no zellkonverter/basilisk) — see
    # qc_ambient_decontx.py + decontx_run.R. The demonstration run still uses `none` only
    # because both datasets are already cell-filtered (GSE136103) / author-processed
    # (GSE244832), so ambient removal is low-value here; switch to `decontx` for raw cohorts.
    method: none               # decontx | soupx | cellbender(GPU-optional) | none
  doublets:
    # Scrublet (Python), run with exact (sklearn) kNN — the default annoy backend's pip
    # wheel raises an illegal-instruction (SIGILL) crash on these compute nodes. BLAS is also
    # single-thread-pinned for safe parallelism. scDblFinder (R) is available via qc_r.
    method: scrublet           # scrublet | scdblfinder | none
    expected_rate: 0.06
  n_mads: 3                     # adaptive MAD threshold (Heumos 2023)
  mito_pct_max:                # per-modality hard ceiling on top of MADs
    scRNA: 8.0                 # hepatocytes are mito-high
    snRNA: 5.0                 # nuclei are mito-low
  min_genes: 200
  min_counts: 500
  min_cells: 3
  keep_stressed: true          # do NOT filter on stress/IEG signature

# Q3 — integration over donor/sample, never over disease condition.
integration:
  method: harmony              # harmony(CPU) | scvi | scanvi (GPU-optional)
  batch_key: sample_id
  n_hvg: 3000
  n_latent: 30
  n_neighbors: 15
  scib_check: true
  fibrosis_signal_guard: true  # fail loudly if condition signal collapses post-integration

# Q4 — annotation + compartment validation.
annotation:
  leiden_resolution: 1.0
  celltypist_model: "Healthy_Adult_Liver.pkl"
  decoupler_ora_min_overlap: 5
  markers_file: config/markers_liver.yaml

# Q5 — donor-aware pseudobulk DE (replication unit = donor).
de:
  engine: deseq2               # deseq2 | edger | muscat
  aggregate: sum
  min_cells_per_donor: 10
  min_donors_per_group: 2
  design: "~ condition"        # covariates appended automatically if present & non-confounded
  covariates: [sex, sort_gate]
  padj_threshold: 0.05
  lfc_threshold: 0.58          # ~1.5x
  contrasts:
    gse136103: {name: cirrhotic_vs_healthy, group: condition, ref: healthy, test: cirrhotic}
    gse244832: {name: F2plus_vs_low, group: fibrosis_bin, ref: low, test: high}

# Q7 (mechanism) — pathway / TF activity + enrichment.
pathway:
  progeny_top: 500
  collectri: true
  gsea_sets: [hallmark, fibrosis_core]
  genesets_dir: config/genesets
  score_method: aucell         # aucell | ucell (per-cell signature scores)

# Q7 — cell-cell communication with overinterpretation guards.
ccc:
  method: liana_consensus
  resource: consensus
  expr_prop: 0.1               # min fraction of cells expressing L/R
  min_cells: 10
  specificity_cutoff: 0.05
  differential: true           # condition-specific CCC
  nichenet_corroborate: true   # require downstream transcriptional response
  min_downstream_targets: 5

# Q1 (validation) — cross-dataset reproducibility (robust to sc/sn modality gap).
crossdataset:
  enabled: true
  match_on: compartment
  rank_metric: stat            # DESeq2 Wald stat used for rank correlation
  min_concordance: 0.0

# Q6 — biomarker prioritization scoring.
score:
  weights: {de: 0.25, specificity: 0.20, reproducibility: 0.20, druggability: 0.15, accessibility: 0.10, ml_shap: 0.10}
  specificity_index: tau
  druggability_sources: [open_targets, dgidb]
  druggability_cache: resources/druggability_snapshot.tsv   # dated offline snapshot
  accessibility:
    surfaceome: resources/surfaceome.csv
    secretome: resources/secretome.csv
  top_n_per_compartment: 5
  top_n_overall: 20
  tie_breaker: [reproducibility, de]
  required_compartments: [stellate_myofibroblast, macrophage_monocyte, endothelial]

# Q6 — ML layer (donor-grouped CV; no donor leakage).
ml:
  model: xgboost               # xgboost | random_forest
  input_level: pseudobulk      # pseudobulk | percell
  cv_folds: 5
  group_key: donor_id
  shap: true

report:
  formats: [html, pdf]
  title: "Cell-Type-Specific Biomarkers in Human Liver Fibrosis"
